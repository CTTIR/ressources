name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  render-check:
    name: Render (warnings = error)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.5.57
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
      - run: Rscript -e 'install.packages(c("jsonlite","knitr","rmarkdown"), repos="https://cloud.r-project.org")'
      - name: Render
        run: |
          set -euo pipefail
          quarto render 2>&1 | tee render.log
          if grep -E "(Warning|WARNING):" render.log; then
            echo "::error ::Render produced warnings — failing per policy."
            exit 1
          fi

  todo-marker-check:
    name: Block deploy on TODO markers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Search for unresolved markers
        run: |
          set -e
          if grep -RIn --include='*.qmd' --include='*.md' -E "TODO_IMPRESSUM|TODO_FILL_BEFORE_DEPLOY" . ; then
            echo "::error ::Unresolved TODO markers present — see PLAN.md. Deploy blocked."
            exit 1
          fi

  link-check:
    name: External link check
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
      - name: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-concurrency 8
            --accept 200,206,301,302,403,429
            --exclude-mail
            './**/*.qmd' './**/*.md'
          fail: true

  doi-verify:
    name: Verify DOIs in references.bib
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
      - name: Verify
        run: Rscript scripts/verify-dois.R

  blocklist-check:
    name: Block commercial / paywalled domains in ressources/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Grep for blocklisted patterns
        run: |
          set -e
          # Strip blank lines and comments from blocklist
          patterns=$(grep -vE '^(#|$)' _data/blocklist.txt || true)
          if [ -z "$patterns" ]; then
            echo "Blocklist is empty — nothing to enforce."
            exit 0
          fi
          # Use fixed-string matching to avoid regex surprises
          hits=$(grep -RIn --include='*.qmd' -F "$patterns" ressources/ || true)
          if [ -n "$hits" ]; then
            echo "::error ::Blocklisted domain(s) referenced in ressources/:"
            echo "$hits"
            exit 1
          fi

  inventory-freshness:
    name: CTIR inventory freshness (<= 30 days)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check last modification
        run: |
          set -e
          last=$(git log -1 --format=%ct -- _data/cttir-repos.json || echo 0)
          if [ "$last" = "0" ]; then
            echo "::error ::_data/cttir-repos.json missing from git history."
            exit 1
          fi
          now=$(date +%s)
          age_days=$(( (now - last) / 86400 ))
          echo "Inventory age: ${age_days} day(s)"
          if [ "$age_days" -gt 30 ]; then
            echo "::error ::Inventory is older than 30 days. Re-run scripts/fetch-cttir-repos.R and commit."
            exit 1
          fi
